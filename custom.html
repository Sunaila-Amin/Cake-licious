<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Cake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="custom.css">
</head>
<body>

<nav class="navbar">
  <h2>Cake-licious</h2>
</nav>

<section class="custom-container">
  <h1>Design Your Cake 🎂</h1>

  <form class="cake-form">

    <!-- Flavor -->
    <label>Choose Flavor</label>
    <select>
      <option>Chocolate</option>
      <option>Vanilla</option>
      <option>Strawberry</option>
    </select>

    <!-- Size -->
    <label>Select Size</label>
    <select>
      <option>500g</option>
      <option>1kg</option>
      <option>2kg</option>
    </select>

    <!-- Message -->
    <label>Custom Message</label>
    <input type="text" placeholder="Write on cake...">

    <!-- Image -->
    <label>Upload Design (optional)</label>
    <input type="file">

    <!-- Button -->
    <button type="submit">Create Cake</button>

  </form>
</section>

</body>
</html>
